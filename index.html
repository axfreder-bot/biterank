<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0e0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BiteRank — Find the Best Dishes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ── SIMPLE 3-STEP UX ── */
    .simple-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .simple-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .simple-logo span { color: var(--accent2); font-style: italic; }
    
    /* STEP INDICATOR */
    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      transition: all 0.3s;
    }
    .step-dot.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .step-dot.done {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .step-line {
      flex: 1;
      height: 2px;
      background: var(--border);
      max-width: 40px;
    }
    .step-line.done { background: var(--green); }
    .step-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }
    .step-content { display: none; padding: 20px 16px; }
    .step-content.active { display: block; }
    
    /* CITY GRID */
    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .city-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .city-card:hover, .city-card:active {
      border-color: var(--accent);
      transform: scale(0.98);
    }
    .city-card.selected {
      border-color: var(--accent);
      background: rgba(232,133,74,0.1);
    }
    .city-emoji { font-size: 2.2rem; margin-bottom: 8px; display: block; }
    .city-name { font-weight: 700; font-size: 0.95rem; }
    .city-count { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    
    /* DISH GRID */
    .dish-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .dish-chip {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dish-chip:hover, .dish-chip:active {
      border-color: var(--accent);
    }
    .dish-chip.selected {
      border-color: var(--accent);
      background: rgba(232,133,74,0.1);
    }
    .dish-emoji { font-size: 1.8rem; margin-bottom: 6px; display: block; }
    .dish-name { font-weight: 600; font-size: 0.85rem; }
    
    .custom-dish-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .custom-dish-input {
      flex: 1;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 14px 16px;
      outline: none;
    }
    .custom-dish-input:focus { border-color: var(--accent); }
    .custom-dish-input::placeholder { color: var(--muted); }
    .go-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
    }
    
    /* RESULTS */
    .results-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .results-back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .results-info { flex: 1; }
    .results-query {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .results-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    
    .resto-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .resto-card:active { transform: scale(0.99); }
    .resto-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .resto-thumb {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .resto-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .resto-info { flex: 1; min-width: 0; }
    .resto-name {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .resto-cuisine { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .resto-rating {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .resto-stars { display: flex; gap: 1px; }
    .resto-star { color: var(--accent2); font-size: 0.8rem; }
    .resto-star.e { color: var(--border); }
    .resto-rnum { font-weight: 700; font-size: 0.9rem; color: var(--accent2); }
    .resto-rcount { font-size: 0.75rem; color: var(--muted); margin-left: 4px; }
    .resto-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }
    .resto-dist {
      font-size: 0.72rem;
      color: var(--green);
      font-weight: 600;
      background: rgba(106,191,138,0.1);
      padding: 2px 8px;
      border-radius: 8px;
    }
    .resto-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .b-dish-hot {
      background: rgba(232,133,74,0.15);
      color: var(--accent);
    }
    .resto-dishes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .resto-dish-tag {
      font-size: 0.72rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 3px 9px;
      border-radius: 10px;
    }
    .resto-dish-tag.matched {
      background: rgba(232,133,74,0.12);
      border-color: rgba(232,133,74,0.3);
      color: var(--accent);
    }

    /* NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 200;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item span:first-child { font-size: 1.3rem; }

    /* PROGRESS BAR */
    .progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* ACTION BUTTON */
    .action-bar {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      z-index: 150;
    }
    .primary-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .primary-btn:hover { background: #d4743c; }
    .primary-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* LOADING */
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      gap: 14px;
      color: var(--muted);
    }
    .loading-state .spinner { margin-bottom: 8px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 900;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- SIMPLE HEADER -->
<div class="simple-header">
  <div class="simple-logo">Bite<span>Rank</span></div>
  <div id="headerRight"></div>
</div>

<!-- STEP INDICATOR -->
<div class="step-indicator" id="stepIndicator">
  <div class="step-dot active" id="dot1">1</div>
  <div class="step-line" id="line1"></div>
  <div class="step-dot" id="dot2">2</div>
  <div class="step-line" id="line2"></div>
  <div class="step-dot" id="dot3">3</div>
</div>

<!-- STEP 1: CITY -->
<div class="step-content active" id="step1">
  <h2 style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:6px;">Where are you?</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">Select a city to search in</p>
  <div class="city-grid" id="cityGrid">
    <!-- Cities injected by JS -->
  </div>
</div>

<!-- STEP 2: DISH -->
<div class="step-content" id="step2">
  <h2 style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:6px;">What are you craving?</h2>
  <p style="color:var(--muted);font-size:0.85rem;margin-bottom:16px;">Choose a dish or search for anything</p>
  
  <div class="dish-grid" id="dishGrid">
    <!-- Popular dishes injected by JS -->
  </div>
  
  <div class="custom-dish-row">
    <input type="text" class="custom-dish-input" id="customDishInput" placeholder="Or type a specific dish...">
    <button class="go-btn" id="customDishBtn">Go</button>
  </div>
</div>

<!-- STEP 3: RESULTS -->
<div class="step-content" id="step3">
  <div class="results-header">
    <div class="results-back" id="backBtn">←</div>
    <div class="results-info">
      <div class="results-query" id="resultsQuery">Tacos in Portland</div>
      <div class="results-meta" id="resultsMeta">12 restaurants found</div>
    </div>
  </div>
  
  <div id="resultsList">
    <!-- Results injected by JS -->
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" data-view="home">
    <span>🔍</span> Search
  </button>
  <button class="nav-item" data-view="map">
    <span>🗺️</span> Map
  </button>
  <button class="nav-item" data-view="profile">
    <span>👤</span> Profile
  </button>
</div>

<!-- ACTION BAR (for steps 1 & 2) -->
<div class="action-bar" id="actionBar">
  <button class="primary-btn" id="nextBtn" disabled>Next</button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── STATE ──
let currentStep = 1;
let selectedCity = null;
let selectedDish = null;
let cityData = {};
let dishData = {};

// ── DATA ──
const CITIES = [
  { id: 'portland', name: 'Portland', emoji: '🌲', count: 47 },
  { id: 'seattle', name: 'Seattle', emoji: '🗼', count: 63 },
  { id: 'san-francisco', name: 'San Francisco', emoji: '🌉', count: 89 },
  { id: 'los-angeles', name: 'Los Angeles', emoji: '🤙', count: 124 },
  { id: 'new-york', name: 'New York', emoji: '🗽', count: 156 },
  { id: 'chicago', name: 'Chicago', emoji: '🌭', count: 71 },
];

const POPULAR_DISHES = [
  { id: 'tacos', name: 'Tacos', emoji: '🌮' },
  { id: 'pizza', name: 'Pizza', emoji: '🍕' },
  { id: 'ramen', name: 'Ramen', emoji: '🍜' },
  { id: 'burger', name: 'Burger', emoji: '🍔' },
  { id: 'sushi', name: 'Sushi', emoji: '🍣' },
  { id: 'pasta', name: 'Pasta', emoji: '🍝' },
  { id: 'poke', name: 'Poke Bowl', emoji: '🥗' },
  { id: 'curry', name: 'Curry', emoji: '🍛' },
];

// Mock restaurant data (replace with API calls)
const MOCK_RESTAURANTS = {
  'portland-tacos': [
    { id: 1, name: 'Tacos Los Hermanos', cuisine: 'Mexican', emoji: '🌮', rating: 4.8, count: 234, distance: '0.3 mi', dishTags: ['Tacos al Pastor', 'Tacos de Carnitas', 'Tacos de Birria'], matchedDish: 'Tacos al Pastor', badge: 'b-dish-hot' },
    { id: 2, name: 'Raiz', cuisine: 'Modern Mexican', emoji: '🌮', rating: 4.6, count: 189, distance: '0.5 mi', dishTags: ['Tacos', 'Burritos', 'Quesadillas'], matchedDish: null, badge: null },
    { id: 3, name: 'Noy', cuisine: 'Thai', emoji: '🍜', rating: 4.7, count: 312, distance: '0.8 mi', dishTags: ['Pad Thai', 'Green Curry', 'Tacos (Fusion)'], matchedDish: 'Tacos (Fusion)', badge: null },
  ],
  'seattle-tacos': [
    { id: 4, name: 'Cactus Taqueria', cuisine: 'Mexican', emoji: '🌮', rating: 4.5, count: 445, distance: '0.4 mi', dishTags: ['Tacos', 'Burritos'], matchedDish: 'Tacos', badge: 'b-dish-hot' },
    { id: 5, name: 'Mole', cuisine: 'Mexican', emoji: '🌮', rating: 4.3, count: 178, distance: '0.9 mi', dishTags: ['Tacos', 'Enchiladas'], matchedDish: 'Tacos', badge: null },
  ],
};

// ── INIT ──
function init() {
  renderCities();
  renderDishes();
  updateStepUI();
  setupEventListeners();
}

function renderCities() {
  const grid = document.getElementById('cityGrid');
  grid.innerHTML = CITIES.map(c => `
    <div class="city-card" data-id="${c.id}">
      <span class="city-emoji">${c.emoji}</span>
      <div class="city-name">${c.name}</div>
      <div class="city-count">${c.count} restaurants</div>
    </div>
  `).join('');
  
  grid.querySelectorAll('.city-card').forEach(card => {
    card.addEventListener('click', () => selectCity(card.dataset.id));
  });
}

function renderDishes() {
  const grid = document.getElementById('dishGrid');
  grid.innerHTML = POPULAR_DISHES.map(d => `
    <div class="dish-chip" data-id="${d.id}">
      <span class="dish-emoji">${d.emoji}</span>
      <div class="dish-name">${d.name}</div>
    </div>
  `).join('');
  
  grid.querySelectorAll('.dish-chip').forEach(chip => {
    chip.addEventListener('click', () => selectDish(chip.dataset.id));
  });
}

function setupEventListeners() {
  document.getElementById('nextBtn').addEventListener('click', goNext);
  document.getElementById('backBtn').addEventListener('click', goBack);
  document.getElementById('customDishBtn').addEventListener('click', submitCustomDish);
  document.getElementById('customDishInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') submitCustomDish();
  });
  
  // Nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      const view = item.dataset.view;
      if (view === 'home') { currentStep = 1; updateStepUI(); }
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      showToast('View: ' + view);
    });
  });
}

// ── SELECTIONS ──
function selectCity(id) {
  selectedCity = CITIES.find(c => c.id === id);
  document.querySelectorAll('.city-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.city-card[data-id="${id}"]`).classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function selectDish(id) {
  const dish = POPULAR_DISHES.find(d => d.id === id);
  selectedDish = dish;
  document.querySelectorAll('.dish-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.dish-chip[data-id="${id}"]`).classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function submitCustomDish() {
  const input = document.getElementById('customDishInput');
  const val = input.value.trim();
  if (!val) return;
  selectedDish = { id: 'custom', name: val, emoji: '🍽️' };
  document.querySelectorAll('.dish-chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('nextBtn').disabled = false;
  goNext();
}

// ── NAVIGATION ──
function goNext() {
  if (currentStep < 3) {
    currentStep++;
    updateStepUI();
    if (currentStep === 3) loadResults();
  }
}

function goBack() {
  if (currentStep > 1) {
    currentStep--;
    updateStepUI();
  }
}

function updateStepUI() {
  // Update step dots
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById(`dot${i}`);
    const line = document.getElementById(`line${i}`);
    dot.classList.remove('active', 'done');
    if (i < currentStep) {
      dot.classList.add('done');
      dot.innerHTML = '✓';
    } else if (i === currentStep) {
      dot.classList.add('active');
      dot.innerHTML = i;
    } else {
      dot.innerHTML = i;
    }
    if (i < 3) {
      line.classList.toggle('done', i < currentStep);
    }
  }
  
  // Show/hide step content
  document.querySelectorAll('.step-content').forEach((el, i) => {
    el.classList.toggle('active', i + 1 === currentStep);
  });
  
  // Update action bar
  const actionBar = document.getElementById('actionBar');
  const nextBtn = document.getElementById('nextBtn');
  
  if (currentStep === 3) {
    actionBar.style.display = 'none';
  } else {
    actionBar.style.display = 'block';
    nextBtn.disabled = (currentStep === 1 && !selectedCity) || (currentStep === 2 && !selectedDish);
    nextBtn.textContent = currentStep === 2 ? 'See Results' : 'Next';
  }
}

// ── RESULTS ──
function loadResults() {
  const resultsList = document.getElementById('resultsList');
  const query = document.getElementById('resultsQuery');
  const meta = document.getElementById('resultsMeta');
  
  // Show loading
  resultsList.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div>Finding best ${selectedDish.name} in ${selectedCity.name}...</div>
    </div>
  `;
  
  query.textContent = `${selectedDish.name} in ${selectedCity.name}`;
  
  // Simulate API call
  setTimeout(() => {
    const key = `${selectedCity.id}-${selectedDish.id}`;
    const restaurants = MOCK_RESTAURANTS[key] || generateMockResults();
    
    meta.textContent = `${restaurants.length} restaurants found`;
    
    resultsList.innerHTML = restaurants.map(r => `
      <div class="resto-card" onclick="openRestaurant(${r.id})">
        <div class="resto-top">
          <div class="resto-thumb">${r.emoji}</div>
          <div class="resto-info">
            <div class="resto-name">${r.name}</div>
            <div class="resto-cuisine">${r.cuisine}</div>
            <div class="resto-rating">
              <div class="resto-stars">${renderStars(r.rating)}</div>
              <span class="resto-rnum">${r.rating}</span>
              <span class="resto-rcount">(${r.count})</span>
            </div>
          </div>
          <div class="resto-right">
            <div class="resto-dist">${r.distance}</div>
            ${r.badge ? `<span class="resto-badge ${r.badge}">Hot</span>` : ''}
          </div>
        </div>
        <div class="resto-dishes">
          ${r.dishTags.map(t => `
            <span class="resto-dish-tag ${t === r.matchedDish ? 'matched' : ''}">${t}</span>
          `).join('')}
        </div>
      </div>
    `).join('');
  }, 800);
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const empty = 5 - full;
  return '★'.repeat(full) + '☆'.repeat(empty);
}

function generateMockResults() {
  const dishes = ['Tacos', 'Pizza', 'Ramen', 'Burger', 'Sushi', 'Pasta'];
  const cuisines = ['Mexican', 'Italian', 'Japanese', 'American', 'Thai', 'Indian'];
  const results = [];
  for (let i = 0; i < 8; i++) {
    results.push({
      id: 100 + i,
      name: `${['Old', 'New', 'Best', 'Golden', 'Red', 'Blue', 'Green', 'Silver'][i]} ${selectedDish.name} Place`,
      cuisine: cuisines[i % cuisines.length],
      emoji: ['🌮', '🍕', '🍜', '🍔', '🍣', '🍝', '🥗', '🍛'][i],
      rating: (4 + Math.random()).toFixed(1),
      count: Math.floor(Math.random() * 300) + 50,
      distance: (Math.random() * 3).toFixed(1) + ' mi',
      dishTags: [selectedDish.name, dishes[(i+1)%6], dishes[(i+2)%6]],
      matchedDish: selectedDish.name,
      badge: i < 2 ? 'b-dish-hot' : null,
    });
  }
  return results.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
}

function openRestaurant(id) {
  showToast('Opening restaurant details...');
}

// ── TOAST ──
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── BOOT ──
init();
</script>
