<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E64A19;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="230" fill="url(#bg)" filter="url(#shadow)"/>
  
  <!-- Fork (top left) -->
  <g fill="white" opacity="0.9">
    <rect x="118" y="115" width="11" height="60" rx="5.5"/>
    <rect x="137" y="115" width="11" height="60" rx="5.5"/>
    <rect x="156" y="115" width="11" height="60" rx="5.5"/>
    <rect x="118" y="165" width="49" height="16" rx="4"/>
    <rect x="137" y="175" width="11" height="80" rx="5.5"/>
  </g>
  
  <!-- Knife (top right) -->
  <g fill="white" opacity="0.9">
    <rect x="345" y="175" width="11" height="80" rx="5.5"/>
    <path d="M 345 115 Q 380 145 380 195 L 380 195 L 356 195 Z" />
  </g>
  
  <!-- BiteRank wordmark -->
  <text x="256" y="290" 
        font-family="Arial Black, Helvetica, sans-serif" 
        font-size="62" 
        font-weight="900" 
        fill="white" 
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-2">BiteRank</text>
  
  <!-- Tagline -->
  <text x="256" y="340" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="18" 
        font-weight="400" 
        fill="white" 
        text-anchor="middle"
        opacity="0.85"
        letter-spacing="3">FOOD DISCOVERY</text>
  
  <!-- Small decorative line -->
  <rect x="200" y="358" width="112" height="2" rx="1" fill="white" opacity="0.6"/>
</svg>