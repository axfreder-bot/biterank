<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0e0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BiteRank — Find the Best Dishes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    /* ── CLEAN 3-STEP UX ── */
    :root {
      --accent: #e8854a;
      --accent2: #c96a3a;
      --bg: #0f0e0c;
      --surface: #1a1917;
      --card: #222120;
      --border: #2e2c2a;
      --text: #f5f2ed;
      --muted: #7a7674;
      --green: #6abf8a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* HEADER */
    .simple-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .simple-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
    }
    .simple-logo span { color: var(--accent2); font-style: italic; }
    .discover-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .discover-btn:hover { border-color: var(--accent); color: var(--accent); }
    .discover-btn:active { transform: scale(0.96); }

    /* STEP INDICATOR */
    .step-indicator {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 0;
    }
    .step-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .step-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-dot.done { background: var(--green); border-color: var(--green); color: #fff; }
    .step-line { flex: 1; height: 2px; background: var(--border); max-width: 40px; }
    .step-line.done { background: var(--green); }

    /* STEP CONTENT */
    .step-content { display: none; padding: 24px 20px 120px; }
    .step-content.active { display: block; }
    .step-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .step-subtitle { color: var(--muted); font-size: 0.88rem; margin-bottom: 20px; }

    /* CITY GRID */
    .city-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .city-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .city-card:active { transform: scale(0.96); }
    .city-card.selected { border-color: var(--accent); background: rgba(232,133,74,0.1); }
    .city-emoji { font-size: 2.2rem; margin-bottom: 8px; display: block; }
    .city-name { font-weight: 700; font-size: 0.9rem; }
    .city-count { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

    /* DISH GRID */
    .dish-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }
    .dish-chip {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dish-chip:active { transform: scale(0.96); }
    .dish-chip.selected { border-color: var(--accent); background: rgba(232,133,74,0.1); }
    .dish-emoji { font-size: 1.8rem; margin-bottom: 6px; display: block; }
    .dish-name { font-weight: 600; font-size: 0.85rem; }

    .custom-dish-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .custom-input {
      flex: 1;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .custom-input:focus { border-color: var(--accent); }
    .custom-input::placeholder { color: var(--muted); }
    .go-btn {
      background: var(--accent);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .go-btn:active { background: #d4743c; }

    /* RESULTS */
    .results-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .results-back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .results-back:active { transform: scale(0.93); }
    .results-info { flex: 1; }
    .results-query {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .results-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .resto-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .resto-card:active { transform: scale(0.98); border-color: var(--accent); }
    .resto-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .resto-thumb {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .resto-info { flex: 1; min-width: 0; }
    .resto-name { font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .resto-cuisine { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
    .resto-rating { display: flex; align-items: center; gap: 6px; margin-top: 5px; }
    .resto-stars { color: var(--accent2); font-size: 0.8rem; }
    .resto-score { font-weight: 700; font-size: 0.9rem; color: var(--accent2); }
    .resto-rcount { font-size: 0.72rem; color: var(--muted); margin-left: 2px; }
    .resto-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .resto-dist { font-size: 0.7rem; font-weight: 600; color: var(--green); background: rgba(106,191,138,0.1); padding: 2px 8px; border-radius: 8px; }
    .hot-badge { font-size: 0.62rem; font-weight: 700; background: rgba(232,133,74,0.15); color: var(--accent); padding: 2px 7px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
    .resto-dishes { display: flex; gap: 6px; flex-wrap: wrap; }
    .resto-dish-tag { font-size: 0.72rem; background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 3px 9px; border-radius: 10px; }
    .resto-dish-tag.matched { background: rgba(232,133,74,0.12); border-color: rgba(232,133,74,0.3); color: var(--accent); }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 200;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      border: none;
      background: transparent;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item span:first-child { font-size: 1.3rem; }

    /* ACTION BAR */
    .action-bar {
      position: fixed;
      bottom: 65px;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 150;
    }
    .primary-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 16px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .primary-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .primary-btn:active:not(:disabled) { background: #d4743c; }

    /* LOADING */
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px; gap: 14px; color: var(--muted); }
    .loading-state .spinner { margin-bottom: 8px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 900;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* LOCATION BAR */
    .location-bar {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 6px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .location-bar:active { border-color: var(--accent); }
    .loc-modal {
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(15,14,12,0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .loc-modal.visible { opacity: 1; pointer-events: auto; }
    .loc-sheet {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .loc-modal.visible .loc-sheet { transform: translateY(0); }
    .loc-sheet-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .loc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .loc-chip { background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .loc-chip:active { border-color: var(--accent); }
    .loc-chip.selected { border-color: var(--accent); background: rgba(232,133,74,0.1); }
    .loc-chip-emoji { font-size: 1.6rem; display: block; margin-bottom: 4px; }
    .loc-chip-name { font-size: 0.78rem; font-weight: 600; }
    .loc-chip-count { font-size: 0.65rem; color: var(--muted); }
  </style>
</head>
<body>

<div class="simple-header">
  <div class="simple-logo" onclick="goHome()">Bite<span>Rank</span></div>
  <button class="discover-btn" onclick="goDiscover()">
    <span>🔍</span> Discover
  </button>
</div>

<!-- LOCATION PICKER -->
<div class="location-bar" onclick="openLocPicker()">
  <span>📍</span>
  <span id="locText">Portland</span>
  <span>▾</span>
</div>

<!-- STEP INDICATOR -->
<div class="step-indicator" id="stepIndicator">
  <div class="step-dot active" id="dot1">1</div>
  <div class="step-line" id="line1"></div>
  <div class="step-dot" id="dot2">2</div>
  <div class="step-line" id="line2"></div>
  <div class="step-dot" id="dot3">3</div>
</div>

<!-- STEP 1: CITY -->
<div class="step-content active" id="step1">
  <div class="step-title">Where are you?</div>
  <div class="step-subtitle">Select a city to search in</div>
  <div class="city-grid" id="cityGrid"></div>
</div>

<!-- STEP 2: DISH -->
<div class="step-content" id="step2">
  <div class="step-title">What are you craving?</div>
  <div class="step-subtitle">Choose a dish or search for anything</div>
  <div class="dish-grid" id="dishGrid"></div>
  <div class="custom-dish-row">
    <input type="text" class="custom-input" id="customDishInput" placeholder="Or type a specific dish...">
    <button class="go-btn" id="customDishBtn">Go</button>
  </div>
</div>

<!-- STEP 3: RESULTS -->
<div class="step-content" id="step3">
  <div class="results-header">
    <div class="results-back" id="backBtn">←</div>
    <div class="results-info">
      <div class="results-query" id="resultsQuery">Tacos in Portland</div>
      <div class="results-meta" id="resultsMeta">12 restaurants found</div>
    </div>
  </div>
  <div id="resultsList"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" data-view="home" onclick="navTo('home')">
    <span>🔍</span> Search
  </button>
  <button class="nav-item" data-view="map" onclick="navTo('map')">
    <span>🗺️</span> Map
  </button>
  <button class="nav-item" data-view="profile" onclick="navTo('profile')">
    <span>👤</span> Profile
  </button>
</div>

<!-- ACTION BAR -->
<div class="action-bar" id="actionBar">
  <button class="primary-btn" id="nextBtn" disabled>Next</button>
</div>

<!-- LOCATION MODAL -->
<div class="loc-modal" id="locModal">
  <div class="loc-sheet">
    <div class="loc-sheet-title">📍 Choose Location</div>
    <div class="loc-grid" id="locGrid"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let currentStep = 1;
let selectedCity = null;
let selectedDish = null;

const CITIES = [
  { id: 'portland', name: 'Portland', emoji: '🌲', count: 47 },
  { id: 'seattle', name: 'Seattle', emoji: '🗼', count: 63 },
  { id: 'sf', name: 'San Francisco', emoji: '🌉', count: 89 },
  { id: 'la', name: 'Los Angeles', emoji: '🤙', count: 124 },
  { id: 'nyc', name: 'New York', emoji: '🗽', count: 156 },
  { id: 'chicago', name: 'Chicago', emoji: '🌭', count: 71 },
];

const POPULAR_DISHES = [
  { id: 'tacos', name: 'Tacos', emoji: '🌮' },
  { id: 'pizza', name: 'Pizza', emoji: '🍕' },
  { id: 'ramen', name: 'Ramen', emoji: '🍜' },
  { id: 'burger', name: 'Burger', emoji: '🍔' },
  { id: 'sushi', name: 'Sushi', emoji: '🍣' },
  { id: 'pasta', name: 'Pasta', emoji: '🍝' },
  { id: 'poke', name: 'Poke Bowl', emoji: '🥗' },
  { id: 'curry', name: 'Curry', emoji: '🍛' },
];

function init() {
  renderCities();
  renderDishes();
  renderLocPicker();
  updateStepUI();
  setupListeners();
}

function goHome() { currentStep = 1; updateStepUI(); }
function goDiscover() { window.location.href = '/discover'; }

function renderCities() {
  const grid = document.getElementById('cityGrid');
  grid.innerHTML = CITIES.map(c => `
    <div class="city-card" data-id="${c.id}">
      <span class="city-emoji">${c.emoji}</span>
      <div class="city-name">${c.name}</div>
      <div class="city-count">${c.count} restaurants</div>
    </div>
  `).join('');
  grid.querySelectorAll('.city-card').forEach(card => {
    card.addEventListener('click', () => selectCity(card.dataset.id));
  });
}

function renderDishes() {
  const grid = document.getElementById('dishGrid');
  grid.innerHTML = POPULAR_DISHES.map(d => `
    <div class="dish-chip" data-id="${d.id}">
      <span class="dish-emoji">${d.emoji}</span>
      <div class="dish-name">${d.name}</div>
    </div>
  `).join('');
  grid.querySelectorAll('.dish-chip').forEach(chip => {
    chip.addEventListener('click', () => selectDish(chip.dataset.id));
  });
}

function renderLocPicker() {
  const grid = document.getElementById('locGrid');
  grid.innerHTML = CITIES.map(c => `
    <div class="loc-chip ${c.id === (selectedCity || CITIES[0]).id ? 'selected' : ''}" data-id="${c.id}">
      <span class="loc-chip-emoji">${c.emoji}</span>
      <div class="loc-chip-name">${c.name}</div>
      <div class="loc-chip-count">${c.count} restaurants</div>
    </div>
  `).join('');
  grid.querySelectorAll('.loc-chip').forEach(chip => {
    chip.addEventListener('click', () => selectCity(chip.dataset.id));
  });
  document.getElementById('locText').textContent = (selectedCity || CITIES[0]).name;
}

function selectCity(id) {
  selectedCity = CITIES.find(c => c.id === id);
  document.querySelectorAll('.city-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.city-card[data-id="${id}"]`).classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
  renderLocPicker();
  closeLocPicker();
}

function selectDish(id) {
  selectedDish = POPULAR_DISHES.find(d => d.id === id);
  document.querySelectorAll('.dish-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.dish-chip[data-id="${id}"]`).classList.add('selected');
  document.getElementById('nextBtn').disabled = false;
}

function setupListeners() {
  document.getElementById('nextBtn').addEventListener('click', goNext);
  document.getElementById('backBtn').addEventListener('click', goBack);
  document.getElementById('customDishBtn').addEventListener('click', submitCustomDish);
  document.getElementById('customDishInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') submitCustomDish();
  });
  document.getElementById('locModal').addEventListener('click', e => {
    if (e.target.id === 'locModal') closeLocPicker();
  });
}

function submitCustomDish() {
  const val = document.getElementById('customDishInput').value.trim();
  if (!val) return;
  selectedDish = { id: 'custom', name: val, emoji: '🍽️' };
  goNext();
}

function goNext() {
  if (currentStep < 3) { currentStep++; updateStepUI(); }
  if (currentStep === 3) loadResults();
}

function goBack() {
  if (currentStep > 1) { currentStep--; updateStepUI(); }
}

function updateStepUI() {
  for (let i = 1; i <= 3; i++) {
    const dot = document.getElementById(`dot${i}`);
    const line = document.getElementById(`line${i}`);
    dot.classList.remove('active', 'done');
    if (i < currentStep) { dot.classList.add('done'); dot.innerHTML = '✓'; }
    else if (i === currentStep) { dot.classList.add('active'); dot.innerHTML = i; }
    else { dot.innerHTML = i; }
    if (i < 3) line.classList.toggle('done', i < currentStep);
  }
  document.querySelectorAll('.step-content').forEach((el, i) => el.classList.toggle('active', i + 1 === currentStep));
  const actionBar = document.getElementById('actionBar');
  const nextBtn = document.getElementById('nextBtn');
  if (currentStep === 3) { actionBar.style.display = 'none'; }
  else {
    actionBar.style.display = 'block';
    nextBtn.disabled = (currentStep === 1 && !selectedCity) || (currentStep === 2 && !selectedDish);
    nextBtn.textContent = currentStep === 2 ? 'See Results' : 'Next';
  }
}

function loadResults() {
  const resultsList = document.getElementById('resultsList');
  const query = document.getElementById('resultsQuery');
  const meta = document.getElementById('resultsMeta');
  resultsList.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>Finding best '+selectedDish.name+'...</div></div>';
  query.textContent = selectedDish.name + ' in ' + selectedCity.name;
  setTimeout(() => {
    const restaurants = generateMockResults();
    meta.textContent = restaurants.length + ' restaurants found';
    resultsList.innerHTML = restaurants.map(r => `
      <div class="resto-card">
        <div class="resto-top">
          <div class="resto-thumb">${r.emoji}</div>
          <div class="resto-info">
            <div class="resto-name">${r.name}</div>
            <div class="resto-cuisine">${r.cuisine}</div>
            <div class="resto-rating">
              <span class="resto-stars">${'★'.repeat(Math.floor(r.rating))}${'☆'.repeat(5-Math.floor(r.rating))}</span>
              <span class="resto-score">${r.rating}</span>
              <span class="resto-rcount">(${r.count})</span>
            </div>
          </div>
          <div class="resto-right">
            ${r.dist ? `<span class="resto-dist">${r.dist}</span>` : ''}
            ${r.hot ? `<span class="hot-badge">Hot</span>` : ''}
          </div>
        </div>
        <div class="resto-dishes">
          ${r.dishTags.map(t => `<span class="resto-dish-tag ${t === selectedDish.name ? 'matched' : ''}">${t}</span>`).join('')}
        </div>
      </div>
    `).join('');
  }, 600);
}

function generateMockResults() {
  const dishes = ['Tacos', 'Pizza', 'Ramen', 'Burger', 'Sushi', 'Pasta', 'Poke Bowl', 'Curry'];
  const cuisines = ['Mexican', 'Italian', 'Japanese', 'American', 'Thai', 'Indian', 'Chinese', 'Korean'];
  const results = [];
  for (let i = 0; i < 8; i++) {
    results.push({
      name: ['The ' + selectedDish.name + ' House', selectedDish.name + ' Expert', 'Local ' + selectedDish.name + ' Co.', selectedDish.name + ' District', 'The ' + selectedDish.name + ' Lab', selectedDish.name + ' Masters', 'Urban ' + selectedDish.name, 'Golden ' + selectedDish.name][i],
      cuisine: cuisines[i % cuisines.length],
      emoji: ['🍽️', '⭐', '🏠', '🍴', '🧪', '👨‍🍳', '🌟', '✨'][i],
      rating: (4 + Math.random()).toFixed(1),
      count: Math.floor(Math.random() * 300) + 50,
      dist: (Math.random() * 3).toFixed(1) + ' mi',
      dishTags: [selectedDish.name, dishes[(i+1)%8], dishes[(i+2)%8]],
      hot: i < 2,
    });
  }
  return results.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
}

function navTo(view) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  event.currentTarget.classList.add('active');
  showToast('Switched to ' + view);
}

function openLocPicker() { document.getElementById('locModal').classList.add('visible'); }
function closeLocPicker() { document.getElementById('locModal').classList.remove('visible'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
